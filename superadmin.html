<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TGH Superadmin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {font-family: Arial; background:#f3f7fd; margin:0;}
.container {max-width:900px; margin:auto; padding:20px;}
.card {background:white; padding:20px; border-radius:12px; margin-bottom:20px;}
button {padding:10px 15px; background:#0B4EA2; color:white; border:none; border-radius:8px;}
input {padding:10px; width:100%; margin-bottom:10px;}
</style>
</head>

<body>
<div class="container">

<h2>Superadmin Login</h2>
<div id="login">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<h3>Tickets generieren</h3>
<input id="count" placeholder="Anzahl">
<button onclick="generateTickets()">Generieren</button>
<p id="status"></p>
</div>

<div class="card">
<h3>Layout hochladen</h3>
<input type="file" id="layoutInput">
</div>

<div class="card">
<h3>ZIP Export</h3>
<button onclick="exportTickets()">Download</button>
</div>

<div class="card">
<h3>Tickets</h3>
<table border="1" width="100%">
<thead><tr><th>Code</th><th>Status</th><th>Aktion</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<script>

const client = supabase.createClient(
"https://ebqevsvhbiertnqqkigk.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVicWV2c3ZoYmllcnRucXFraWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzI1MzIsImV4cCI6MjA5Mjk0ODUzMn0.hlbW90t0ncDjLq_oxDdQafEz80WcfgF8Rvt-XTKslIk"
);

let tickets = [];
let layoutImage = null;

document.getElementById("layoutInput").addEventListener("change", e=>{
const reader = new FileReader();
reader.onload = ()=> layoutImage = reader.result;
reader.readAsDataURL(e.target.files[0]);
});

async function login(){
const {error} = await client.auth.signInWithPassword({
email: email.value,
password: password.value
});
if(!error){
login.style.display="none";
app.style.display="block";
loadTickets();
}
}

async function loadTickets(){
const {data} = await client.from("tickets").select("*");
tickets = data;
render();
}

function render(){
tbody.innerHTML = tickets.map(t=>`
<tr>
<td>${t.code}</td>
<td>${t.used?"🔴 eingelöst":"🟢 gültig"}</td>
<td>${t.used?`<button onclick="reactivate('${t.code}')">Reaktivieren</button>`:""}</td>
</tr>`).join("");
}

async function reactivate(code){
await client.from("tickets").update({
used:false,
used_at:null,
used_by:null
}).eq("code",code);
loadTickets();
}

function randomCode(){
const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
let c="";
for(let i=0;i<10;i++) c+=chars[Math.floor(Math.random()*chars.length)];
return c;
}

async function generateTickets(){
const count = parseInt(document.getElementById("count").value);
const {data:{user}} = await client.auth.getUser();

let list=[];
for(let i=0;i<count;i++){
let code=randomCode();
list.push({
code,
parkschein_id:code.slice(0,6),
nummer:i,
status:"valid",
used:false,
created_by:user.id
});
}
await client.from("tickets").insert(list);
status.innerText="fertig";
loadTickets();
}

async function exportTickets(){
if(!layoutImage){alert("Layout fehlt"); return;}

const zip=new JSZip();

for(let t of tickets){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const img=new Image();
img.src=layoutImage;
await new Promise(r=>img.onload=r);

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

const qrCanvas=document.createElement("canvas");
await QRCode.toCanvas(qrCanvas, location.origin+"/?id="+t.code);

ctx.drawImage(qrCanvas, canvas.width-200, canvas.height-200, 180,180);

ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText(t.code,50,canvas.height-50);

const blob=await new Promise(r=>canvas.toBlob(r));
zip.file(t.code+".png", blob);
}

const content = await zip.generateAsync({type:"blob"});
const a=document.createElement("a");
a.href=URL.createObjectURL(content);
a.download="tickets.zip";
a.click();
}

</script>

</body>
</html>
