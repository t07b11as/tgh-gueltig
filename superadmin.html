<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TGH Superadmin V2 · redeem-final-fix</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --blue:#0B4EA2; --dark:#062B5F; --bg:#F3F7FD; --text:#102033;
  --muted:#667085; --green:#039855; --red:#D92D20; --amber:#F79009; --line:#D8E4F2;
}
* { box-sizing:border-box; }
body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
.topbar { height:64px; display:flex; align-items:center; gap:14px; padding:0 18px; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; }
.burger { font-size:28px; background:transparent; color:var(--blue); border:none; padding:8px; cursor:pointer; }
.brand { font-weight:900; color:var(--dark); }
.layout { display:flex; min-height:calc(100vh - 64px); }
.sidebar { width:290px; background:#fff; border-right:1px solid var(--line); padding:14px; display:none; }
.sidebar.open { display:block; position:fixed; top:64px; bottom:0; left:0; z-index:20; box-shadow:10px 0 30px rgba(0,0,0,.08); }
.navbtn { width:100%; text-align:left; margin:6px 0; background:#eef5ff; color:var(--blue); }
.navbtn.active { background:var(--blue); color:white; }
.main { flex:1; padding:22px; max-width:1300px; margin:0 auto; width:100%; }
.card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:16px; box-shadow:0 10px 26px rgba(11,78,162,.07); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; }
button { border:0; border-radius:12px; padding:10px 14px; font-weight:800; cursor:pointer; background:var(--blue); color:#fff; }
button.secondary { background:#eef5ff; color:var(--blue); border:1px solid #cfe0f7; }
button.green { background:var(--green); }
button.red { background:var(--red); }
button.amber { background:var(--amber); }
input,select,textarea { width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-size:15px; background:#fff; }
textarea { min-height:90px; }
label { display:block; margin:10px 0 5px; font-size:13px; color:var(--muted); font-weight:800; }
.table { width:100%; border-collapse:collapse; }
.table th,.table td { border-bottom:1px solid var(--line); padding:9px; text-align:left; font-size:14px; vertical-align:top; }
.table th { color:var(--muted); text-transform:uppercase; font-size:12px; }
.hidden { display:none!important; }
.small { color:var(--muted); font-size:13px; }
.status { padding:20px; border-radius:18px; font-size:32px; font-weight:1000; text-align:center; }
.valid { background:#E7FFF4; color:#007A4D; }
.used { background:#FFF1F0; color:var(--red); }
.closed { background:#FFF7E6; color:#B54708; }
.tile { cursor:pointer; transition:.15s; }
.tile:hover { transform:translateY(-2px); }
.previewImg { max-width:100%; max-height:220px; border-radius:12px; border:1px solid var(--line); }
.canvasWrap { overflow:auto; border:1px solid var(--line); border-radius:14px; background:#f8fbff; padding:10px; }
#layoutCanvas { max-width:100%; background:white; }
.row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.kpi { background:#f8fbff; border:1px solid var(--line); border-radius:16px; padding:16px; }
.kpi strong { display:block; font-size:30px; color:var(--blue); }
#reader { min-height:260px; border:1px solid var(--line); border-radius:14px; overflow:hidden; }
@media(min-width:900px) { .sidebar { display:block; position:static; box-shadow:none; } .burger { display:none; } }
</style>
</head>
<body>
<div class="topbar">
  <button class="burger" onclick="toggleMenu()">☰</button>
  <div class="brand">TGH Superadmin V2</div>
  <div class="small" id="sessionInfo"></div>
</div>

<div class="layout">
  <aside id="sidebar" class="sidebar">
    <button class="navbtn active" onclick="showSection('events', this)">Event- und Ticketmanagement</button>
    <button class="navbtn" onclick="showSection('editor', this)">Ticket-Editor</button>
    <button class="navbtn" onclick="showSection('scan', this)">Scannen</button>
    <button class="navbtn" onclick="showSection('users', this)">Nutzer</button>
    <hr>
    <button class="secondary" onclick="logout()">Ausloggen</button>
  </aside>

  <main class="main">
    <section id="loginSection" class="card">
      <h2>Login</h2>
      <label>Benutzername oder E-Mail</label><input id="loginEmail" type="text" placeholder="z.B. max">
      <label>Passwort</label><input id="loginPassword" type="password">
      <p><button onclick="login()">Einloggen</button></p>
      <p id="loginMsg" class="small"></p>
    </section>

    <section id="appSection" class="hidden">
      <section id="events" class="section">
        <div class="card">
          <h2>Event- und Ticketmanagement</h2>
          <div class="grid">
            <div>
              <label>Eventname</label><input id="eventName" placeholder="z.B. POKALFINALE 26">
              <label>Datum</label><input id="eventDate" type="date">
              <label>Ort</label><input id="eventLocation">
            </div>
            <div>
              <label>Beschreibung / Notizen</label><textarea id="eventDescription"></textarea>
              <label>Layout zuordnen</label><select id="eventLayout"></select>
              <p><button onclick="createEvent()">Event anlegen</button></p>
            </div>
          </div>
        </div>
        <div class="card">
          <h3>Events</h3>
          <div id="eventsGrid" class="grid"></div>
        </div>
        <div id="eventDetail" class="card hidden"></div>
      </section>

      <section id="editor" class="section hidden">
        <div class="card">
          <h2>Ticket-Editor</h2>
          <div class="grid">
            <div>
              <label>Layout-Name</label><input id="layoutName">
              <label>Layout-Bild hochladen (PNG/JPG)</label><input id="layoutFile" type="file" accept="image/png,image/jpeg">
              <label>Event zuordnen</label><select id="layoutEvent"></select>
              <p><button onclick="saveLayout()">Layout speichern</button></p>
            </div>
            <div>
              <label>QR X</label><input id="qrX" type="number" value="70">
              <label>QR Y</label><input id="qrY" type="number" value="70">
              <label>QR Größe</label><input id="qrSize" type="number" value="180">
              <label>Code X</label><input id="codeX" type="number" value="50">
              <label>Code Y</label><input id="codeY" type="number" value="820">
              <label>Schriftgröße</label><input id="fontSize" type="number" value="28">
              <p><button class="secondary" onclick="drawPreview()">Vorschau aktualisieren</button></p>
            </div>
          </div>
          <div class="canvasWrap"><canvas id="layoutCanvas"></canvas></div>
        </div>
        <div class="card">
          <h3>Gespeicherte Layouts</h3>
          <div id="layoutsGrid" class="grid"></div>
        </div>
      </section>

      <section id="scan" class="section hidden">
        <div class="card">
          <h2>Scannen</h2>
          <label>Event auswählen</label><select id="scanEvent"></select>
          <div class="grid">
            <div>
              <div id="reader"></div>
              <p class="row"><button onclick="startScanner()">Kamera starten</button><button class="secondary" onclick="stopScanner()">Stoppen</button></p>
            </div>
            <div>
              <label>Manuell prüfen</label><input id="manualScan">
              <p><button onclick="checkManual()">Prüfen</button></p>
              <div id="scanResult"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="users" class="section hidden">
        <div class="card">
          <h2>Nutzer</h2>
          <p class="small">Auth-User zuerst in Supabase mit Dummy-Mail anlegen, z.B. max@tgh.local. Danach hier speichern.</p>
          <div class="grid">
            <div><label>User UID</label><input id="profileUid"></div>
            <div><label>Benutzername</label><input id="profileUsername" placeholder="z.B. max"></div>
            <div><label>E-Mail intern</label><input id="profileEmail" placeholder="max@tgh.local"></div>
            <div><label>Rolle</label><select id="profileRole"><option value="ticketing">ticketing</option><option value="superadmin">superadmin</option></select></div>
            <div><label>Status</label><select id="profileActive"><option value="true">aktiv</option><option value="false">gesperrt</option></select></div>
          </div>
          <p><button onclick="saveProfile()">Nutzerprofil speichern</button></p>
        </div>
        <div class="card">
          <h3>Nutzerübersicht & Scanverlauf</h3>
          <div id="usersTable"></div>
        </div>
      </section>
    </section>
  </main>
</div>

<script>
const SUPABASE_URL = "https://ebqevsvhbiertnqqkigk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVicWV2c3ZoYmllcnRucXFraWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzI1MzIsImV4cCI6MjA5Mjk0ODUzMn0.hlbW90t0ncDjLq_oxDdQafEz80WcfgF8Rvt-XTKslIk";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let events = [];
let layouts = [];
let tickets = [];
let profiles = [];
let scanLogs = [];
let selectedEvent = null;
let selectedLayout = null;
let layoutImageData = null;
let html5QrCode = null;

function normalizeLogin(v) {
  let email = (v || "").trim();
  if (email && !email.includes("@")) email = email.toLowerCase().replace(/\s+/g, "") + "@tgh.local";
  return email;
}

function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  if (id === 'users') loadUsers();
  if (id === 'scan') refreshSelects();
}

async function login() {
  const email = normalizeLogin(loginEmail.value);
  const password = loginPassword.value;
  loginMsg.textContent = 'Login läuft...';
  const { error } = await client.auth.signInWithPassword({ email, password });
  if (error) { loginMsg.textContent = 'Fehler: ' + error.message; return; }
  await init();
}

async function logout() { await client.auth.signOut(); location.reload(); }

async function init() {
  const { data } = await client.auth.getUser();
  currentUser = data.user;
  if (!currentUser) return;
  loginSection.classList.add('hidden');
  appSection.classList.remove('hidden');
  sessionInfo.textContent = currentUser.email || '';
  await loadAll();
}

async function loadAll() {
  const [ev, lay, tic, prof, logs] = await Promise.all([
    client.from('events').select('*').order('created_at', { ascending:false }),
    client.from('ticket_layouts').select('*').order('created_at', { ascending:false }),
    client.from('tickets').select('*').order('created_at', { ascending:false }),
    client.from('profiles').select('*'),
    client.from('scan_logs').select('*').order('scanned_at', { ascending:false }).limit(1000)
  ]);
  if (ev.error) alert('Events Fehler: ' + ev.error.message);
  if (lay.error) alert('Layouts Fehler: ' + lay.error.message);
  if (tic.error) alert('Tickets Fehler: ' + tic.error.message);
  events = ev.data || [];
  layouts = lay.data || [];
  tickets = tic.data || [];
  profiles = prof.data || [];
  scanLogs = logs.data || [];
  renderEvents();
  renderLayouts();
  refreshSelects();
}

function refreshSelects() {
  const layoutOptions = ['<option value="">Kein Layout</option>'].concat(layouts.map(l => `<option value="${l.id}">${l.name}</option>`)).join('');
  eventLayout.innerHTML = layoutOptions;
  const eventOptions = ['<option value="">Kein Event</option>'].concat(events.map(e => `<option value="${e.id}">${e.name} (${e.status})</option>`)).join('');
  layoutEvent.innerHTML = eventOptions;
  scanEvent.innerHTML = eventOptions;
}

async function createEvent() {
  const payload = {
    name: eventName.value.trim(),
    event_date: eventDate.value || null,
    location: eventLocation.value.trim(),
    description: eventDescription.value.trim(),
    layout_id: eventLayout.value || null,
    status: 'closed',
    created_by: currentUser.id
  };
  if (!payload.name) return alert('Eventname fehlt.');
  const { error } = await client.from('events').insert(payload);
  if (error) return alert(error.message);
  eventName.value = eventDate.value = eventLocation.value = eventDescription.value = '';
  await loadAll();
}

function renderEvents() {
  eventsGrid.innerHTML = events.map(e => {
    const count = tickets.filter(t => t.event_id === e.id).length;
    const used = tickets.filter(t => t.event_id === e.id && t.used).length;
    return `<div class="card tile" onclick="openEvent('${e.id}')">
      <h3>${e.name}</h3>
      <p class="small">${e.event_date || '-'} · ${e.location || '-'}</p>
      <p><b>Status:</b> ${e.status === 'open' ? '🟢 offen' : '🔴 geschlossen'}</p>
      <p><b>Tickets:</b> ${count} · <b>Eingelöst:</b> ${used}</p>
    </div>`;
  }).join('');
}

function ticketTypeOptions(current) {
  const opts = ['VIP','Presse','Verband','Verein','Public','Ehrenkarte','Parkschein'];
  return opts.map(o => `<option value="${o}" ${(current || 'Parkschein') === o ? 'selected' : ''}>${o}</option>`).join('');
}

function openEvent(id) {
  selectedEvent = events.find(e => e.id === id);
  const evTickets = tickets.filter(t => t.event_id === id);
  const logs = scanLogs.filter(l => l.event_id === id);
  eventDetail.classList.remove('hidden');
  eventDetail.innerHTML = `
    <h2>${selectedEvent.name}</h2>
    <p class="small">${selectedEvent.event_date || '-'} · ${selectedEvent.location || '-'}</p>
    <p>${selectedEvent.description || ''}</p>
    <p class="row">
      <button class="${selectedEvent.status === 'open' ? 'red' : 'green'}" onclick="toggleEventStatus('${id}')">
        ${selectedEvent.status === 'open' ? 'Event schließen' : 'Event öffnen'}
      </button>
      <button class="secondary" onclick="prepareTicketsForEvent('${id}')">Tickets für dieses Event erstellen</button>
      <button class="secondary" onclick="exportTicketsForEvent('${id}')">Tickets als ZIP exportieren</button>
    </p>
    <div class="grid">
      <div class="kpi"><span class="small">Tickets</span><strong>${evTickets.length}</strong></div>
      <div class="kpi"><span class="small">Eingelöst</span><strong>${evTickets.filter(t=>t.used).length}</strong></div>
      <div class="kpi"><span class="small">Offen</span><strong>${evTickets.filter(t=>!t.used).length}</strong></div>
    </div>
    <h3>Tickets</h3>
    <div style="overflow:auto"><table class="table">
      <thead><tr><th>Code</th><th>Inhaber</th><th>Art</th><th>Status</th><th>Eingelöst</th><th>User</th><th>Aktion</th></tr></thead>
      <tbody>${evTickets.map(t => {
        const user = profiles.find(p => p.id === t.used_by);
        return `<tr>
          <td>${t.code}</td>
          <td><input value="${t.ticket_holder || ''}" onchange="updateTicketField('${t.code}','ticket_holder',this.value)"></td>
          <td><select onchange="updateTicketField('${t.code}','ticket_type',this.value)">${ticketTypeOptions(t.ticket_type)}</select></td>
          <td>${t.used ? '🔴 eingelöst' : '🟢 gültig'}</td>
          <td>${t.used_at ? new Date(t.used_at).toLocaleString('de-DE') : '-'}</td>
          <td>${user?.username || user?.email || t.used_by || '-'}</td>
          <td>${t.used ? `<button onclick="reactivateTicket('${t.code}')">Reaktivieren</button>` : ''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    <h3>Scanverlauf</h3>
    <div style="overflow:auto"><table class="table">
      <thead><tr><th>Zeit</th><th>Code</th><th>Ergebnis</th><th>User</th></tr></thead>
      <tbody>${logs.map(l => `<tr><td>${new Date(l.scanned_at).toLocaleString('de-DE')}</td><td>${l.ticket_code || '-'}</td><td>${l.result}</td><td>${profiles.find(p=>p.id===l.user_id)?.username || profiles.find(p=>p.id===l.user_id)?.email || l.user_id || '-'}</td></tr>`).join('')}</tbody>
    </table></div>`;
}

async function toggleEventStatus(id) {
  const e = events.find(x => x.id === id);
  const next = e.status === 'open' ? 'closed' : 'open';
  const { error } = await client.from('events').update({ status: next }).eq('id', id);
  if (error) return alert(error.message);
  await loadAll(); openEvent(id);
}

function prepareTicketsForEvent(id) {
  const count = prompt('Wie viele Tickets für dieses Event erstellen?');
  if (!count) return;
  generateTicketsForEvent(id, parseInt(count,10));
}

function randomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const part = n => Array.from({length:n},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  return `TGH-${part(4)}-${part(4)}-${part(2)}`;
}

async function generateTicketsForEvent(eventId, count) {
  if (!count || count <= 0) return alert('Ungültige Anzahl.');
  const ev = events.find(e => e.id === eventId);
  const layoutId = ev.layout_id || layouts.find(l => l.assigned_event_id === eventId)?.id || null;
  const rows = [];
  for (let i=0;i<count;i++) {
    const code = randomCode();
    rows.push({
      code, event_id: eventId, layout_id: layoutId,
      parkschein_id: code.split('-').slice(0,3).join('-'),
      nummer: code.split('-').at(-1),
      ticket_holder: '', ticket_type: 'Parkschein',
      status:'valid', used:false, created_by: currentUser.id
    });
  }
  const { error } = await client.from('tickets').insert(rows);
  if (error) return alert(error.message);
  await loadAll(); openEvent(eventId);
}

async function updateTicketField(code, field, value) {
  const { error } = await client.from('tickets').update({ [field]: value }).eq('code', code);
  if (error) alert(error.message);
}

async function reactivateTicket(code) {
  if (!confirm('Ticket wirklich reaktivieren?')) return;
  const { error } = await client.from('tickets').update({ used:false, used_at:null, used_by:null }).eq('code', code);
  if (error) return alert(error.message);
  await loadAll(); if (selectedEvent) openEvent(selectedEvent.id);
}

layoutFile.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { layoutImageData = reader.result; drawPreview(); };
  reader.readAsDataURL(file);
});

async function saveLayout() {
  const payload = {
    name: layoutName.value.trim(),
    image_data: layoutImageData || selectedLayout?.image_data || null,
    qr_x: parseInt(qrX.value,10), qr_y: parseInt(qrY.value,10), qr_size: parseInt(qrSize.value,10),
    code_x: parseInt(codeX.value,10), code_y: parseInt(codeY.value,10), font_size: parseInt(fontSize.value,10),
    assigned_event_id: layoutEvent.value || null,
    created_by: currentUser.id
  };
  if (!payload.name) return alert('Layout-Name fehlt.');
  if (!payload.image_data) return alert('Layout-Bild fehlt.');
  let res;
  if (selectedLayout) res = await client.from('ticket_layouts').update(payload).eq('id', selectedLayout.id);
  else res = await client.from('ticket_layouts').insert(payload);
  if (res.error) return alert(res.error.message);
  selectedLayout = null; layoutName.value = ''; layoutImageData = null; layoutFile.value = '';
  await loadAll();
}

function renderLayouts() {
  layoutsGrid.innerHTML = layouts.map(l => `<div class="card tile" onclick="openLayout('${l.id}')">
    <h3>${l.name}</h3>
    ${l.image_data ? `<img class="previewImg" src="${l.image_data}">` : ''}
    <p class="small">Event: ${events.find(e=>e.id===l.assigned_event_id)?.name || 'keins'}</p>
  </div>`).join('');
}

function openLayout(id) {
  selectedLayout = layouts.find(l => l.id === id);
  layoutName.value = selectedLayout.name;
  qrX.value = selectedLayout.qr_x; qrY.value = selectedLayout.qr_y; qrSize.value = selectedLayout.qr_size;
  codeX.value = selectedLayout.code_x; codeY.value = selectedLayout.code_y; fontSize.value = selectedLayout.font_size;
  layoutEvent.value = selectedLayout.assigned_event_id || '';
  layoutImageData = selectedLayout.image_data;
  drawPreview();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function drawPreview() {
  const canvas = layoutCanvas, ctx = canvas.getContext('2d');
  if (!layoutImageData) {
    canvas.width = 900; canvas.height = 500;
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#667085'; ctx.font = '24px Arial'; ctx.fillText('Layout hochladen für Vorschau', 40, 80);
    return;
  }
  const img = new Image();
  img.onload = async () => {
    canvas.width = img.width; canvas.height = img.height;
    ctx.drawImage(img,0,0);
    const qrCanvas = document.createElement('canvas');
    await QRCode.toCanvas(qrCanvas, 'https://t07b11as.github.io/tgh-gueltig/?id=DEMO-CODE');
    ctx.drawImage(qrCanvas, parseInt(qrX.value,10), parseInt(qrY.value,10), parseInt(qrSize.value,10), parseInt(qrSize.value,10));
    ctx.fillStyle = 'black'; ctx.font = parseInt(fontSize.value,10) + 'px Arial';
    ctx.fillText('DEMO-CODE', parseInt(codeX.value,10), parseInt(codeY.value,10));
  };
  img.src = layoutImageData;
}

async function exportTicketsForEvent(eventId) {
  const ev = events.find(e => e.id === eventId);
  const evTickets = tickets.filter(t => t.event_id === eventId);
  const layout = layouts.find(l => l.id === ev.layout_id) || layouts.find(l => l.assigned_event_id === eventId);
  if (!layout || !layout.image_data) return alert('Kein Layout für dieses Event gefunden.');
  if (!evTickets.length) return alert('Keine Tickets für dieses Event.');
  const zip = new JSZip();
  for (const t of evTickets) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = layout.image_data;
    await new Promise(resolve => img.onload = resolve);
    canvas.width = img.width; canvas.height = img.height;
    ctx.drawImage(img,0,0);
    const qrCanvas = document.createElement('canvas');
    await QRCode.toCanvas(qrCanvas, 'https://t07b11as.github.io/tgh-gueltig/?id=' + t.code);
    ctx.drawImage(qrCanvas, layout.qr_x, layout.qr_y, layout.qr_size, layout.qr_size);
    ctx.fillStyle = 'black'; ctx.font = layout.font_size + 'px Arial';
    ctx.fillText(t.code, layout.code_x, layout.code_y);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    zip.file(t.code + '.png', blob);
  }
  const content = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = (ev.name || 'tickets').replace(/\s+/g,'_') + '.zip';
  a.click();
}

async function startScanner() {
  if (html5QrCode) return;
  html5QrCode = new Html5Qrcode('reader');
  await html5QrCode.start({ facingMode:'environment' }, { fps:10, qrbox:250 },
    async decoded => { await stopScanner(); await checkCode(extractCode(decoded)); },
    () => {}
  );
}

async function stopScanner() {
  if (!html5QrCode) return;
  try { await html5QrCode.stop(); } catch(e) {}
  html5QrCode.clear(); html5QrCode = null;
}

function extractCode(raw) {
  try { const u = new URL(raw); return u.searchParams.get('id') || u.searchParams.get('code') || raw.trim(); }
  catch(e) { return (raw || '').trim(); }
}

async function checkManual() { await checkCode(extractCode(manualScan.value)); }

async function checkCode(code) {
  const eventId = scanEvent.value || null;
  const ev = events.find(e => e.id === eventId);
  if (!ev) return scanResult.innerHTML = '<div class="status closed">Bitte Event auswählen</div>';
  if (ev.status !== 'open') {
    await logScan(code, eventId, 'EVENT_CLOSED');
    return scanResult.innerHTML = '<div class="status closed">EVENT GESCHLOSSEN</div>';
  }
  const { data:t, error } = await client.from('tickets').select('*').eq('code', code).maybeSingle();
  if (error || !t || t.event_id !== eventId) {
    await logScan(code, eventId, 'INVALID');
    return scanResult.innerHTML = '<div class="status used">UNGÜLTIG</div>';
  }
  if (t.used) {
    await logScan(t.code, eventId, 'ALREADY_USED');
    return scanResult.innerHTML = `<div class="status used">BEREITS EINGELÖST</div><p>${t.code}</p>`;
  }
  const now = new Date().toISOString();
  const { error:upErr } = await client.from('tickets').update({ used:true, used_at:now, used_by:currentUser.id }).eq('code', t.code).eq('used', false);
  if (upErr) return alert(upErr.message);
  await logScan(t.code, eventId, 'REDEEMED');
  scanResult.innerHTML = `<div class="status valid">GÜLTIG & EINGELÖST</div><p>${t.code}</p><p>${t.ticket_holder || ''} · ${t.ticket_type || ''}</p>`;
  await loadAll();
}

async function logScan(code, eventId, result) {
  await client.from('scan_logs').insert({ ticket_code: code, event_id: eventId, user_id: currentUser.id, result });
}

async function loadUsers() {
  const [p,l] = await Promise.all([
    client.from('profiles').select('*').order('created_at', { ascending:false }),
    client.from('scan_logs').select('*').order('scanned_at', { ascending:false }).limit(1000)
  ]);
  profiles = p.data || []; scanLogs = l.data || [];
  usersTable.innerHTML = `<table class="table"><thead><tr><th>Nutzer</th><th>E-Mail</th><th>Rolle</th><th>Status</th><th>Scans</th><th>Letzte Scans</th><th>Aktion</th></tr></thead><tbody>
    ${profiles.map(pr => {
      const logs = scanLogs.filter(x => x.user_id === pr.id);
      return `<tr><td>${pr.username || '-'}</td><td>${pr.email || pr.id}</td><td>${pr.role}</td><td>${pr.active ? 'aktiv' : 'gesperrt'}</td><td>${logs.length}</td><td>${logs.slice(0,3).map(x => new Date(x.scanned_at).toLocaleString('de-DE') + ' · ' + x.result).join('<br>')}</td><td><button onclick="toggleUserActive('${pr.id}', ${pr.active})">${pr.active ? 'Sperren' : 'Aktivieren'}</button></td></tr>`;
    }).join('')}</tbody></table>`;
}

async function saveProfile() {
  const username = profileUsername.value.trim().toLowerCase().replace(/\s+/g, "");
  const payload = { id: profileUid.value.trim(), username, email: profileEmail.value.trim() || (username ? username + '@tgh.local' : ''), role: profileRole.value, active: profileActive.value === 'true' };
  if (!payload.id || !payload.username) return alert('UID und Benutzername fehlen.');
  const { error } = await client.from('profiles').upsert(payload);
  if (error) return alert(error.message);
  await loadUsers();
}

async function toggleUserActive(id, active) {
  const { error } = await client.from('profiles').update({ active: !active }).eq('id', id);
  if (error) return alert(error.message);
  await loadUsers();
}

client.auth.getSession().then(({ data }) => { if (data.session) init(); });
drawPreview();
</script>
