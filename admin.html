<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TGH Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
:root{
  --blue:#002F6C;
  --blue2:#001F4E;
  --royal:#0047AB;
  --bg:#EEF4FF;
  --text:#102033;
  --muted:#667085;
  --green:#039855;
  --red:#D92D20;
  --amber:#F79009;
  --line:#C9D8EE;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eaf2ff,#ffffff);color:var(--text);min-height:100vh}
.header{padding:16px 22px;background:linear-gradient(135deg,var(--blue2),var(--blue));border-bottom:1px solid #173f78;color:white;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.header img{width:54px;height:54px;object-fit:contain;background:white;border-radius:14px;padding:6px}
.header h1{margin:0;font-size:23px}
.header p{margin:3px 0 0;color:#D8E6FF;font-size:13px}
.wrap{max-width:980px;margin:auto;padding:18px}
.card{background:white;border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:16px;box-shadow:0 14px 36px rgba(0,47,108,.11)}
.loginLogo{display:block;width:108px;height:108px;object-fit:contain;margin:0 auto 12px;background:white;border-radius:24px;padding:8px;box-shadow:0 10px 26px rgba(0,47,108,.14)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
input,select{width:100%;padding:13px;border:1px solid var(--line);border-radius:14px;box-sizing:border-box;font-size:16px}
label{display:block;margin:10px 0 5px;color:var(--muted);font-weight:800}
button{background:var(--blue);color:white;border:0;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer}
button:hover{background:var(--royal)}
.secondary{background:#eef5ff;color:var(--blue);border:1px solid #cfe0f7}
.hidden{display:none!important}
.status{border-radius:20px;padding:28px;text-align:center;font-size:38px;font-weight:1000;letter-spacing:.02em}
.valid{background:#E7FFF4;color:#007A4D;border:2px solid #9BE7C2}
.used{background:#FFF1F0;color:var(--red);border:2px solid #FDA29B}
.closed{background:#FFF7E6;color:#B54708;border:2px solid #FEDF89}
.unknown{background:#F2F4F7;color:#344054;border:2px solid #D0D5DD}
#reader{min-height:260px;border:1px solid var(--line);border-radius:16px;overflow:hidden}
#result{position:sticky;top:86px;z-index:12;border:2px solid var(--blue);box-shadow:0 16px 42px rgba(0,47,108,.18)}
.small{font-size:13px;color:var(--muted)}
@media(max-width:700px){
  .wrap{padding:12px}
  .header{padding:12px 14px}
  .header img{width:46px;height:46px;border-radius:12px}
  .header h1{font-size:19px}
  #result{position:sticky;top:72px;margin-bottom:12px}
  .status{font-size:30px;padding:22px 12px}
}
</style>
</head>
<body>
<div class="header"><img src="assets/tgh-logo.png" alt="TGH Logo"><div><h1>TGH Scanner</h1><p>Ticketing & Einlasskontrolle</p></div></div>
<main class="wrap">
<section id="loginCard" class="card">
<img class="loginLogo" src="assets/tgh-logo.png" alt="TGH Logo"><h2>Login</h2>
<label>Benutzername oder E-Mail</label><input id="email" placeholder="z.B. max">
<label>Passwort</label><input id="password" type="password">
<p><button onclick="login()">Einloggen</button></p>
<p id="loginMsg" class="small"></p>
</section>

<section id="app" class="hidden">
<div id="result" class="card hidden"></div>
<div class="grid">
<div class="card">
<h2>Scannen</h2>
<label>Event</label><select id="scanEvent"></select>
<br><br><div id="reader"></div>
<p><button onclick="startScanner()">Kamera starten</button> <button class="secondary" onclick="stopScanner()">Stoppen</button></p>
</div>
<div class="card">
<h2>Manuell prüfen</h2>
<label>Code oder Link</label><input id="manualCode">
<p><button onclick="checkManual()">Prüfen</button></p>
<p><button class="secondary" onclick="logout()">Ausloggen</button></p>
</div>
</div>
</section>
</main>

<script>
const client = supabase.createClient("https://ebqevsvhbiertnqqkigk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVicWV2c3ZoYmllcnRucXFraWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzI1MzIsImV4cCI6MjA5Mjk0ODUzMn0.hlbW90t0ncDjLq_oxDdQafEz80WcfgF8Rvt-XTKslIk");
let currentUser = null;
let events = [];
let html5QrCode = null;

function normLogin(value) {
  let email = (value || "").trim();
  if (email && !email.includes("@")) {
    email = email.toLowerCase().replace(/\s+/g, "") + "@tgh.local";
  }
  return email;
}

function normalizeScanned(raw) {
  let value = (raw || "").trim();
  try {
    const u = new URL(value);
    value = u.searchParams.get("id") || u.searchParams.get("code") || value;
  } catch(e) {}
  return value.trim();
}

function numberFromScan(raw) {
  const value = normalizeScanned(raw);
  const match = value.match(/(\d{2})$/);
  return match ? match[1] : value;
}

async function findTicket(raw, eventId) {
  const scanned = normalizeScanned(raw);
  const nummer = numberFromScan(scanned);

  // 1 exact code
  let q = client.from("tickets").select("*").eq("code", scanned);
  if (eventId) q = q.eq("event_id", eventId);
  let res = await q.limit(2);
  if (!res.error && res.data && res.data.length === 1) return res.data[0];

  // 2 match by nummer inside selected event
  q = client.from("tickets").select("*").eq("nummer", nummer);
  if (eventId) q = q.eq("event_id", eventId);
  res = await q.limit(2);
  if (!res.error && res.data && res.data.length === 1) return res.data[0];

  // 3 match by code suffix -01
  q = client.from("tickets").select("*").ilike("code", "%-" + nummer);
  if (eventId) q = q.eq("event_id", eventId);
  res = await q.limit(2);
  if (!res.error && res.data && res.data.length === 1) return res.data[0];

  return null;
}

async function login() {
  loginMsg.textContent = "Login läuft...";
  const { error } = await client.auth.signInWithPassword({
    email: normLogin(email.value),
    password: password.value
  });
  if (error) {
    loginMsg.textContent = "Fehler: " + error.message;
    return;
  }
  await init();
}

async function logout() {
  await client.auth.signOut();
  location.reload();
}

async function init() {
  const { data } = await client.auth.getUser();
  currentUser = data.user;
  if (!currentUser) return;
  loginCard.classList.add("hidden");
  app.classList.remove("hidden");
  await loadEvents();
}

async function loadEvents() {
  const { data, error } = await client.from("events").select("*").order("created_at", { ascending:false });
  if (error) return alert(error.message);
  events = data || [];
  scanEvent.innerHTML = '<option value="">Event wählen</option>' + events.map(e => `<option value="${e.id}">${e.name} (${e.status})</option>`).join("");
}

async function startScanner() {
  if (html5QrCode) return;
  html5QrCode = new Html5Qrcode("reader");
  await html5QrCode.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    async decoded => {
      await stopScanner();
      await checkCode(decoded);
    },
    () => {}
  );
}

async function stopScanner() {
  if (!html5QrCode) return;
  try { await html5QrCode.stop(); } catch(e) {}
  html5QrCode.clear();
  html5QrCode = null;
}

async function checkManual() {
  await checkCode(manualCode.value);
}

async function logScan(ticketCode, eventId, resultText) {
  await client.from("scan_logs").insert({
    ticket_code: ticketCode,
    event_id: eventId,
    user_id: currentUser.id,
    result: resultText
  });
}

function show(cls, title, body = "") {
  result.classList.remove("hidden");
  result.innerHTML = `<div class="status ${cls}">${title}</div><p>${body}</p>`;
}

async function checkCode(rawCode) {
  const eventId = scanEvent.value;
  const ev = events.find(e => e.id === eventId);
  const scanned = normalizeScanned(rawCode);

  if (!ev) return show("closed", "EVENT FEHLT", "Bitte Event auswählen.");
  if (ev.status !== "open") {
    await logScan(scanned, eventId, "EVENT_CLOSED");
    return show("closed", "EVENT GESCHLOSSEN");
  }

  const ticket = await findTicket(scanned, eventId);

  if (!ticket) {
    await logScan(scanned, eventId, "INVALID");
    return show("unknown", "UNGÜLTIG", "Gescannter Wert: " + scanned);
  }

  if (ticket.used === true) {
    await logScan(ticket.code, eventId, "ALREADY_USED");
    return show("used", "BEREITS EINGELÖST", ticket.code + "<br>" + (ticket.used_at ? new Date(ticket.used_at).toLocaleString("de-DE") : ""));
  }

  const now = new Date().toISOString();

  // Critical fix: update by the REAL database ticket code, not by scanned ?id=01
  const { data: updated, error } = await client
    .from("tickets")
    .update({ used:true, used_at:now, used_by:currentUser.id })
    .eq("code", ticket.code)
    .eq("used", false)
    .select("*");

  if (error) return alert(error.message);

  if (!updated || updated.length !== 1) {
    await logScan(ticket.code, eventId, "ALREADY_USED");
    return show("used", "BEREITS EINGELÖST", ticket.code);
  }

  await logScan(ticket.code, eventId, "REDEEMED");
  show("valid", "GÜLTIG & EINGELÖST", ticket.code);
}

client.auth.getSession().then(({
  data
}) => {
  if (data.session) init();
});
</script>
</body>
</html>
