<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TGH Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f3f7fd;color:#102033}
.header{padding:18px 22px;background:white;border-bottom:1px solid #D8E4F2}
.wrap{max-width:900px;margin:auto;padding:22px}
.card{background:white;border:1px solid #D8E4F2;border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 10px 26px rgba(11,78,162,.07)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
input,select{width:100%;padding:12px;border:1px solid #D8E4F2;border-radius:12px;box-sizing:border-box}
label{display:block;margin:10px 0 5px;color:#667085;font-weight:800}
button{background:#0B4EA2;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}
.secondary{background:#eef5ff;color:#0B4EA2;border:1px solid #cfe0f7}
.hidden{display:none!important}
.status{border-radius:18px;padding:24px;text-align:center;font-size:34px;font-weight:1000}
.valid{background:#E7FFF4;color:#007A4D}.used{background:#FFF1F0;color:#D92D20}.closed{background:#FFF7E6;color:#B54708}.unknown{background:#F2F4F7;color:#344054}
#reader{min-height:260px;border:1px solid #D8E4F2;border-radius:14px;overflow:hidden}
.small{font-size:13px;color:#667085}
</style>
</head>
<body>
<div class="header"><h1>TGH Scanner</h1><p class="small">Version: redeem-final-fix</p></div>
<main class="wrap">
<section id="loginCard" class="card">
<h2>Login</h2>
<label>Benutzername oder E-Mail</label><input id="email" placeholder="z.B. max">
<label>Passwort</label><input id="password" type="password">
<p><button onclick="login()">Einloggen</button></p>
<p id="loginMsg" class="small"></p>
</section>

<section id="app" class="hidden">
<div class="grid">
<div class="card">
<h2>Scannen</h2>
<label>Event</label><select id="scanEvent"></select>
<br><br><div id="reader"></div>
<p><button onclick="startScanner()">Kamera starten</button> <button class="secondary" onclick="stopScanner()">Stoppen</button></p>
</div>
<div class="card">
<h2>Manuell prüfen</h2>
<label>Code oder Link</label><input id="manualCode">
<p><button onclick="checkManual()">Prüfen</button></p>
<p><button class="secondary" onclick="logout()">Ausloggen</button></p>
</div>
</div>
<div id="result" class="card hidden"></div>
</section>
</main>

<script>
const client = supabase.createClient("https://ebqevsvhbiertnqqkigk.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVicWV2c3ZoYmllcnRucXFraWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzI1MzIsImV4cCI6MjA5Mjk0ODUzMn0.hlbW90t0ncDjLq_oxDdQafEz80WcfgF8Rvt-XTKslIk");
let currentUser = null;
let events = [];
let html5QrCode = null;

function normLogin(value) {
  let email = (value || "").trim();
  if (email && !email.includes("@")) {
    email = email.toLowerCase().replace(/\s+/g, "") + "@tgh.local";
  }
  return email;
}

function normalizeScanned(raw) {
  let value = (raw || "").trim();
  try {
    const u = new URL(value);
    value = u.searchParams.get("id") || u.searchParams.get("code") || value;
  } catch(e) {}
  return value.trim();
}

function numberFromScan(raw) {
  const value = normalizeScanned(raw);
  const match = value.match(/(\d{2})$/);
  return match ? match[1] : value;
}

async function findTicket(raw, eventId) {
  const scanned = normalizeScanned(raw);
  const nummer = numberFromScan(scanned);

  // 1 exact code
  let q = client.from("tickets").select("*").eq("code", scanned);
  if (eventId) q = q.eq("event_id", eventId);
  let res = await q.limit(2);
  if (!res.error && res.data && res.data.length === 1) return res.data[0];

  // 2 match by nummer inside selected event
  q = client.from("tickets").select("*").eq("nummer", nummer);
  if (eventId) q = q.eq("event_id", eventId);
  res = await q.limit(2);
  if (!res.error && res.data && res.data.length === 1) return res.data[0];

  // 3 match by code suffix -01
  q = client.from("tickets").select("*").ilike("code", "%-" + nummer);
  if (eventId) q = q.eq("event_id", eventId);
  res = await q.limit(2);
  if (!res.error && res.data && res.data.length === 1) return res.data[0];

  return null;
}

async function login() {
  loginMsg.textContent = "Login läuft...";
  const { error } = await client.auth.signInWithPassword({
    email: normLogin(email.value),
    password: password.value
  });
  if (error) {
    loginMsg.textContent = "Fehler: " + error.message;
    return;
  }
  await init();
}

async function logout() {
  await client.auth.signOut();
  location.reload();
}

async function init() {
  const { data } = await client.auth.getUser();
  currentUser = data.user;
  if (!currentUser) return;
  loginCard.classList.add("hidden");
  app.classList.remove("hidden");
  await loadEvents();
}

async function loadEvents() {
  const { data, error } = await client.from("events").select("*").order("created_at", { ascending:false });
  if (error) return alert(error.message);
  events = data || [];
  scanEvent.innerHTML = '<option value="">Event wählen</option>' + events.map(e => `<option value="${e.id}">${e.name} (${e.status})</option>`).join("");
}

async function startScanner() {
  if (html5QrCode) return;
  html5QrCode = new Html5Qrcode("reader");
  await html5QrCode.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    async decoded => {
      await stopScanner();
      await checkCode(decoded);
    },
    () => {}
  );
}

async function stopScanner() {
  if (!html5QrCode) return;
  try { await html5QrCode.stop(); } catch(e) {}
  html5QrCode.clear();
  html5QrCode = null;
}

async function checkManual() {
  await checkCode(manualCode.value);
}

async function logScan(ticketCode, eventId, resultText) {
  await client.from("scan_logs").insert({
    ticket_code: ticketCode,
    event_id: eventId,
    user_id: currentUser.id,
    result: resultText
  });
}

function show(cls, title, body = "") {
  result.classList.remove("hidden");
  result.innerHTML = `<div class="status ${cls}">${title}</div><p>${body}</p>`;
}

async function checkCode(rawCode) {
  const eventId = scanEvent.value;
  const ev = events.find(e => e.id === eventId);
  const scanned = normalizeScanned(rawCode);

  if (!ev) return show("closed", "EVENT FEHLT", "Bitte Event auswählen.");
  if (ev.status !== "open") {
    await logScan(scanned, eventId, "EVENT_CLOSED");
    return show("closed", "EVENT GESCHLOSSEN");
  }

  const ticket = await findTicket(scanned, eventId);

  if (!ticket) {
    await logScan(scanned, eventId, "INVALID");
    return show("unknown", "UNGÜLTIG", "Gescannter Wert: " + scanned);
  }

  if (ticket.used === true) {
    await logScan(ticket.code, eventId, "ALREADY_USED");
    return show("used", "BEREITS EINGELÖST", ticket.code + "<br>" + (ticket.used_at ? new Date(ticket.used_at).toLocaleString("de-DE") : ""));
  }

  const now = new Date().toISOString();

  // Critical fix: update by the REAL database ticket code, not by scanned ?id=01
  const { data: updated, error } = await client
    .from("tickets")
    .update({ used:true, used_at:now, used_by:currentUser.id })
    .eq("code", ticket.code)
    .eq("used", false)
    .select("*");

  if (error) return alert(error.message);

  if (!updated || updated.length !== 1) {
    await logScan(ticket.code, eventId, "ALREADY_USED");
    return show("used", "BEREITS EINGELÖST", ticket.code);
  }

  await logScan(ticket.code, eventId, "REDEEMED");
  show("valid", "GÜLTIG & EINGELÖST", ticket.code);
}

client.auth.getSession().then(({
  data
}) => {
  if (data.session) init();
});
</script>
</body>
</html>
